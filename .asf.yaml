# see https://s.apache.org/asfyaml
github:
  description: "Apache Maven Site Plugin"
  homepage: https://maven.apache.org/plugins/maven-site-plugin/
  labels:
    - java
    - build-management
    - maven-plugins
    - maven-site-plugin
    - maven
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: true
  protected_branches:
    master: { }
    maven-site-plugin-3.12.x: { }
  autolink_jira:
    - MSITE
  del_branch_on_merge: true
  features:
    issues: true
notifications:
  commits: commits@maven.apache.org
  issues: issues@maven.apache.org
  pullrequests: issues@maven.apache.org

# https://release-test.apache.org/projects/maven-site-plugin see https://s.apache.org/asfyaml#project
project:
  metadata:
    key: maven-site-plugin
    committee: maven
    name: Apache Maven Site Plugin
    description: The Maven Site Plugin is a plugin that generates a site for the current project.
    short_description: The Maven Site Plugin is a plugin that generates a site for the current project.
    homepage: https://maven.apache.org/plugins/maven-site-plugin/
    download_page: https://maven.apache.org/plugins/maven-site-plugin/download.cgi
    bug_database: https://maven.apache.org/plugins/maven-site-plugin/issue-management.html
    mailing_lists: https://maven.apache.org/plugins/maven-site-plugin/mailing-lists.html
    repositories:
      - https://github.com/apache/maven-site-plugin.git
    categories:
      - build-management
    programming_languages:
      - Java
  policy:
    github_repository_name: maven-site-plugin
    download_path_suffix: plugins
  features:
    atr_sync: true
